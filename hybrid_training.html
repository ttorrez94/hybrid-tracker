// ─── HELPERS ───
function getMonday(d = new Date()) {
  const date = new Date(d); date.setHours(0,0,0,0);
  const day = date.getDay();
  const diff = date.getDate() - day + (day === 0 ? -6 : 1);
  date.setDate(diff);
  return date;
}
function fmtDate(d) { return d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}); }
function fmtISO(d) { return d.toISOString().slice(0,10); }
function dateForDay(monday, offset) { const d = new Date(monday); d.setDate(d.getDate()+offset); return d; }
function getLib(name) { return EXERCISE_LIBRARY.find(e=>e.name===name)||null; }

function calcVolume(weight, repsStr) {
  if (!weight || !repsStr) return 0;
  const w = parseFloat(weight);
  const reps = repsStr.split('*').map(Number).filter(n=>!isNaN(n));
  return reps.reduce((s,r)=>s+w*r, 0);
}

// ─── SETS HELPERS ───
// getSets returns the sets array, falling back to parsing legacy reps string
function getSets(exercise) {
  if (Array.isArray(exercise?.sets)) return exercise.sets;
  if (typeof exercise?.reps === "string" && exercise.reps.length > 0) {
    return exercise.reps.split("*").map(s => s.trim());
  }
  return ["", "", ""];
}

// setsToRepsString joins sets back into legacy "8*8*8" format for storage
function setsToRepsString(sets) {
  if (!Array.isArray(sets)) return "";
  return sets.map(s => s == null ? "" : String(s).trim()).join("*");
}

// Helper: get rest time for a given exercise name
function getDefaultRest(exerciseName) {
  const lib = getLib(exerciseName);
  if (!lib) return DEFAULT_REST_COMPOUND;
  return lib.ci === "C" ? DEFAULT_REST_COMPOUND : DEFAULT_REST_ISOLATION;
}

// ─── AUDIO + HAPTICS ───
// Uses Web Audio for beeps (works on iOS once unlocked by a user tap).
// Call primeAudio() inside the click handler that starts the first timer.
let _audioCtx = null;
function primeAudio() {
  if (_audioCtx) return;
  try {
    const AC = window.AudioContext || window.webkitAudioContext;
    if (AC) _audioCtx = new AC();
  } catch (e) {}
}
function beep(freq = 880, duration = 0.15, volume = 0.35) {
  if (!_audioCtx) return;
  try {
    const osc = _audioCtx.createOscillator();
    const gain = _audioCtx.createGain();
    osc.frequency.value = freq;
    osc.type = "sine";
    gain.gain.setValueAtTime(volume, _audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, _audioCtx.currentTime + duration);
    osc.connect(gain); gain.connect(_audioCtx.destination);
    osc.start(); osc.stop(_audioCtx.currentTime + duration);
  } catch (e) {}
}
function buzz(pattern = 200) {
  try { if (navigator.vibrate) navigator.vibrate(pattern); } catch (e) {}
}
function playEndCue(muted) {
  if (muted) return;
  // Triple beep ascending
  beep(660, 0.12);
  setTimeout(() => beep(880, 0.12), 150);
  setTimeout(() => beep(1100, 0.2), 300);
  buzz([200, 80, 200, 80, 400]);
}
function playTickCue(muted) {
  if (muted) return;
  beep(440, 0.08, 0.2);
  buzz(60);
}

// ─── SCREEN WAKE LOCK ───
// Keeps the phone from sleeping while a timer is running.
async function requestWakeLock(ref) {
  try {
    if ("wakeLock" in navigator) {
      ref.current = await navigator.wakeLock.request("screen");
    }
  } catch (e) {}
}
function releaseWakeLock(ref) {
  try {
    if (ref.current) { ref.current.release(); ref.current = null; }
  } catch (e) {}
}

// setInterval fidelity — survives backgrounded tabs on mobile.
function useTimer({ duration, onTick, onComplete, muted }) {
  const [remaining, setRemaining] = useState(duration);
  const [running, setRunning] = useState(false);
  const endTimeRef = useRef(null);
  const rafRef = useRef(null);
  const wakeLockRef = useRef(null);

  const start = useCallback((newDuration) => {
    const d = newDuration != null ? newDuration : duration;
    endTimeRef.current = Date.now() + d * 1000;
    setRemaining(d);
    setRunning(true);
    requestWakeLock(wakeLockRef);
  }, [duration]);

  const pause = useCallback(() => {
    if (!running) return;
    const left = Math.max(0, (endTimeRef.current - Date.now()) / 1000);
    setRemaining(left);
    setRunning(false);
    releaseWakeLock(wakeLockRef);
  }, [running]);

  const resume = useCallback(() => {
    endTimeRef.current = Date.now() + remaining * 1000;
    setRunning(true);
    requestWakeLock(wakeLockRef);
  }, [remaining]);

  const stop = useCallback(() => {
    setRunning(false);
    setRemaining(0);
    releaseWakeLock(wakeLockRef);
  }, []);

  const addTime = useCallback((seconds) => {
    if (running && endTimeRef.current) {
      endTimeRef.current += seconds * 1000;
      setRemaining((endTimeRef.current - Date.now()) / 1000);
    } else {
      setRemaining((r) => Math.max(0, r + seconds));
    }
  }, [running]);

  useEffect(() => {
    if (!running) return;
    const tick = () => {
      const left = (endTimeRef.current - Date.now()) / 1000;
      if (left <= 0) {
        setRemaining(0);
        setRunning(false);
        releaseWakeLock(wakeLockRef);
        playEndCue(muted);
        if (onComplete) onComplete();
        return;
      }
      setRemaining(left);
      if (onTick) onTick(left);
      rafRef.current = requestAnimationFrame(tick);
    };
    rafRef.current = requestAnimationFrame(tick);
    return () => { if (rafRef.current) cancelAnimationFrame(rafRef.current); };
  }, [running, muted, onComplete, onTick]);

  useEffect(() => () => releaseWakeLock(wakeLockRef), []);

  return { remaining, running, start, pause, resume, stop, addTime };
}

// ─── FORMAT ───
function formatMMSS(seconds) {
  const s = Math.max(0, Math.ceil(seconds));
  const m = Math.floor(s / 60);
  const r = s % 60;
  return `${m}:${r.toString().padStart(2, "0")}`;
}

// ─── STICKY TIMER BAR ───
// Displays at the bottom of the screen above the nav when a timer is active.
// phase = "rest" (blue) or "transition" (amber)
function StickyTimerBar({ phase, label, duration, onDismiss, muted, setMuted }) {
  const { remaining, running, pause, resume, stop, addTime } = useTimer({
    duration,
    muted,
    onComplete: () => {
      // Auto-dismiss after 3s of showing 0:00
      setTimeout(() => { if (onDismiss) onDismiss(); }, 2500);
    },
  });

  // Auto-start on mount
  useEffect(() => {
    // Start immediately when component mounts
    const t = setTimeout(() => {
      // Kick a start via addTime / manual hack — easier: call start explicitly
    }, 0);
    return () => clearTimeout(t);
  }, []);

  // Better: manage running state externally by always starting fresh
  const [started, setStarted] = useState(false);
  useEffect(() => {
    if (!started) {
      setStarted(true);
      // start handled by useTimer via passing initial duration — but we need to trigger start.
      // Since useTimer starts paused, we call resume() on mount:
      resume();
    }
  }, [started, resume]);

  const isRest = phase === "rest";
  const bg = isRest ? "#1e3a8a" : "#92400e";       // blue-900 / amber-800
  const accent = isRest ? "#60a5fa" : "#fbbf24";   // blue-400 / amber-400
  const progress = Math.max(0, Math.min(1, remaining / duration));

  return (
    <div style={{
      position: "fixed",
      bottom: 56,             // sits above the bottom nav (adjust if nav is taller)
      left: "50%",
      transform: "translateX(-50%)",
      width: "100%",
      maxWidth: 480,
      background: bg,
      borderTop: `1px solid ${accent}`,
      padding: "10px 14px",
      display: "flex",
      alignItems: "center",
      gap: 10,
      zIndex: 200,
      fontFamily: "var(--font)",
      boxShadow: "0 -4px 12px rgba(0,0,0,0.4)",
    }}>
      {/* Progress ring */}
      <div style={{ position: "relative", width: 44, height: 44, flexShrink: 0 }}>
        <svg width="44" height="44" viewBox="0 0 44 44">
          <circle cx="22" cy="22" r="19" fill="none" stroke="rgba(255,255,255,0.15)" strokeWidth="3" />
          <circle
            cx="22" cy="22" r="19" fill="none"
            stroke={accent} strokeWidth="3" strokeLinecap="round"
            strokeDasharray={`${2 * Math.PI * 19}`}
            strokeDashoffset={`${2 * Math.PI * 19 * (1 - progress)}`}
            transform="rotate(-90 22 22)"
            style={{ transition: "stroke-dashoffset 0.1s linear" }}
          />
        </svg>
        <div style={{
          position: "absolute", inset: 0, display: "flex", alignItems: "center",
          justifyContent: "center", fontSize: 11, fontWeight: 800, color: "#fff",
        }}>{formatMMSS(remaining)}</div>
      </div>

      {/* Label */}
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ fontSize: 10, fontWeight: 700, color: accent, textTransform: "uppercase", letterSpacing: "0.5px" }}>
          {isRest ? "Rest" : "Next Exercise"}
        </div>
        <div style={{ fontSize: 13, fontWeight: 600, color: "#fff", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>
          {label}
        </div>
      </div>

      {/* Controls */}
      <button onClick={() => addTime(-15)} style={tBtn}>-15</button>
      <button onClick={() => addTime(15)} style={tBtn}>+15</button>
      <button onClick={() => { running ? pause() : resume(); }} style={{ ...tBtn, minWidth: 56 }}>
        {running ? "Pause" : "Resume"}
      </button>
      <button onClick={() => { stop(); if (onDismiss) onDismiss(); }} style={{ ...tBtn, background: "rgba(255,255,255,0.25)" }}>
        Skip
      </button>
      <button onClick={() => setMuted(!muted)} style={{ ...tBtn, padding: "6px 8px" }} title={muted ? "Unmute" : "Mute"}>
        {muted ? "🔇" : "🔊"}
      </button>
    </div>
  );
}

          <input type="text" placeholder="Notes..." value={exercise.notes||""} onChange={e=>onChange({...exercise,notes:e.target.value})}

      </>}
    </div>
  );
}

function StrengthDay({ dayKey, title, exercises, onExercisesChange, history, monday, offset, onExerciseDone }) {
  const [pickerIdx, setPickerIdx] = useState(null);
  const doneCount = exercises.filter(e=>e.done).length;
  const total = exercises.filter(e=>e.name).length;
  const dayDate = dateForDay(monday, offset);
  const dateStr = fmtISO(dayDate);

  const getLastSession = (exName) => {
    if (!exName) return null;
    const prev = history.filter(h=>h.exercise===exName && h.date < fmtISO(monday)).sort((a,b)=>b.date.localeCompare(a.date));
    if (prev.length === 0) return null;
    const p = prev[0];
    const sets = Array.isArray(p.sets) ? p.sets : (p.reps ? p.reps.split("*").map(s=>s.trim()) : []);
    return { weight: p.weight, reps: p.reps, sets };
  };

  const handleChange = (i, updated) => {
    const wasNotDone = !exercises[i]?.done;
    const nowDone = updated.done;
    const n = [...exercises]; n[i] = updated;
    onExercisesChange(n);
    if (wasNotDone && nowDone && updated.name && onExerciseDone) {
      onExerciseDone(updated);
    }
  };

  const addSlot = () => { onExercisesChange([...exercises, {name:"",weight:"",sets:["","",""],reps:"",notes:"",done:false}]); };
  const removeSlot = (i) => { const next=[...exercises]; next.splice(i,1); onExercisesChange(next); };

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,padding:"0 2px"}}>
        <div>
          <div style={{fontSize:11,color:"var(--accent)",fontWeight:700,fontFamily:"var(--font)",textTransform:"uppercase",letterSpacing:"0.5px"}}>{title}</div>
          <div style={{fontSize:11,color:"var(--text-muted)",fontFamily:"var(--font)"}}>{fmtDate(dayDate)} • {doneCount}/{total} done</div>
        </div>
        <div style={{fontSize:22,fontWeight:800,color:doneCount===total&&total>0?"#22c55e":"var(--text-muted)",fontFamily:"var(--font)"}}>{doneCount===total&&total>0?"✓":""}</div>
      </div>
      {exercises.map((ex,i)=>(
        <div key={i} id={`ex-${dayKey}-${i}`} style={{position:"relative"}}>
          <ExerciseCard exercise={ex} onChange={u=>handleChange(i,u)} lastSession={getLastSession(ex.name)} onPickExercise={()=>setPickerIdx(i)} onSetComplete={onExerciseDone}/>
          {exercises.length>1&&<button onClick={()=>removeSlot(i)} style={{position:"absolute",top:6,right:50,background:"none",border:"none",color:"var(--text-muted)",fontSize:14,cursor:"pointer",opacity:0.4,padding:4}}>✕</button>}
        </div>
      ))}
      <button onClick={addSlot} style={{width:"100%",padding:"10px",border:"1px dashed var(--border)",borderRadius:10,background:"transparent",color:"var(--text-muted)",fontFamily:"var(--font)",fontSize:12,cursor:"pointer",marginTop:4}}>+ Add Exercise</button>
      {pickerIdx!==null && <ExercisePicker onSelect={name=>{const n=[...exercises];n[pickerIdx]={...n[pickerIdx],name};onExercisesChange(n);}} onClose={()=>setPickerIdx(null)}/>}
    </div>
  );
}

function DashboardView({ state, history, monday }) {
  const { exercises, cardio, recovery, addons } = state;
  // Count done
  let strengthDone=0, strengthTotal=0;
  ["tue","thu","sat"].forEach(k=>{(exercises[k]||[]).forEach(e=>{if(e.name){strengthTotal++;if(e.done)strengthDone++;}});});
  let cardioDone=0;
  ["mon","wed","fri"].forEach(k=>{if(cardio[k]?.done)cardioDone++;});
  if(recovery?.done)cardioDone++;
  let ptDone=0,ptTotal=5;
  ["mon","wed","fri"].forEach(k=>{if(cardio[k]?.pt)ptDone++;});
  ["tue","thu","sat"].forEach(k=>{/* PT on strength days tracked via state.pt */});
  if(state.pt?.tue)ptDone++;if(state.pt?.thu)ptDone++;if(state.pt?.sat)ptDone++;
  // not handling strength day PT in preview but counts available
  
  // Muscles covered
  const coveredMuscles = new Set();
  ["tue","thu","sat"].forEach(k=>{(exercises[k]||[]).forEach(ex=>{if(ex.name){const l=getLib(ex.name);if(l)l.target.split(" / ").forEach(m=>coveredMuscles.add(m.trim()));}});});
  Object.values(addons||{}).forEach(addon=>{(addon.exercises||[]).forEach(ex=>{if(ex.name){const l=getLib(ex.name);if(l)l.target.split(" / ").forEach(m=>coveredMuscles.add(m.trim()));}});});
  const gaps = MUSCLE_GROUPS.filter(m=>!coveredMuscles.has(m));

  // Week stats — calculate live from completed exercises (current week)
  const completedWeekExercises = [];
  ["tue","thu","sat"].forEach((k, ki) => {
    const offset = [1,3,5][ki];
    const dayDate = fmtISO(dateForDay(monday, offset));
    (exercises[k] || []).forEach(ex => {
      if (ex.done && ex.name) {
        completedWeekExercises.push({ ...ex, date: dayDate });
      }
    });
  });
  Object.entries(addons || {}).forEach(([ak, ad]) => {
    (ad.exercises || []).forEach(ex => {
      if (ex.done && ex.name) {
        completedWeekExercises.push({ ...ex, date: fmtISO(monday) });
      }
    });
  });

  const totalLoad = completedWeekExercises.reduce((s, h) => s + calcVolume(h.weight, h.reps), 0);
  const heaviest = completedWeekExercises.length ? Math.max(...completedWeekExercises.map(h => parseFloat(h.weight) || 0)) : 0;
  const daysTrained = new Set(completedWeekExercises.map(h => h.date)).size;

  // Most trained muscle
  const muscleHits = {};
  completedWeekExercises.forEach(h => {
    const l = getLib(h.exercise || h.name);
    if (l) l.target.split(" / ").forEach(m => { muscleHits[m.trim()] = (muscleHits[m.trim()] || 0) + 1; });
  });
  const topMuscle = Object.entries(muscleHits).sort((a,b) => b[1] - a[1])[0];

  return (
    <div>
      {/* Progress bars */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
        {[{label:"Strength",done:strengthDone,total:strengthTotal,color:"#6366f1"},
          {label:"Cardio/Recovery",done:cardioDone,total:4,color:"#22c55e"},
        ].map(p=>(
          <div key={p.label} style={{background:"var(--card-bg)",border:"1px solid var(--border)",borderRadius:12,padding:"12px 14px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
              <span style={{fontSize:11,fontWeight:700,fontFamily:"var(--font)",color:"var(--text-muted)",textTransform:"uppercase",letterSpacing:"0.5px"}}>{p.label}</span>
              <span style={{fontSize:14,fontWeight:800,fontFamily:"var(--font)",color:p.done===p.total&&p.total>0?p.color:"var(--text-primary)"}}>{p.done}/{p.total}</span>
            </div>
            <div style={{height:4,background:"var(--border)",borderRadius:2,overflow:"hidden"}}>
              <div style={{height:"100%",width:`${p.total?p.done/p.total*100:0}%`,background:p.color,borderRadius:2,transition:"width 0.3s"}}/>
            </div>
          </div>
        ))}
      </div>

      {/* PT tracker */}
      <div style={{background:"var(--card-bg)",border:"1px solid var(--border)",borderRadius:12,padding:"12px 14px",marginBottom:12}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontSize:11,fontWeight:700,fontFamily:"var(--font)",color:"var(--text-muted)",textTransform:"uppercase",letterSpacing:"0.5px"}}>Neck PT</span>
          <span style={{fontSize:14,fontWeight:800,fontFamily:"var(--font)"}}>{ptDone}/5</span>
        </div>
      </div>

      {/* Week at a Glance */}
      <div style={{background:"var(--card-bg)",border:"1px solid var(--border)",borderRadius:12,padding:"14px",marginBottom:12}}>
        <div style={{fontSize:11,fontWeight:700,fontFamily:"var(--font)",color:"var(--text-muted)",textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:10}}>Week at a Glance</div>
        {DAYS_CONFIG.map((d,i)=>{
          let status="—";let statusColor="var(--text-muted)";
          if(d.type==="strength"){const exs=exercises[d.key]||[];const done=exs.filter(e=>e.done).length;const tot=exs.filter(e=>e.name).length;if(done===tot&&tot>0){status="✓ Complete";statusColor="#22c55e";}else if(done>0){status=`${done}/${tot}`;statusColor="#f59e0b";}else{status="Not started";}}
          else if(d.type==="cardio"){status=cardio[d.key]?.done?"✓ Done":"Not done";statusColor=cardio[d.key]?.done?"#22c55e":"var(--text-muted)";}
          else{status=recovery?.done?"✓ Done":"Not done";statusColor=recovery?.done?"#22c55e":"var(--text-muted)";}
          return(
            <div key={d.key} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"4px 0",borderBottom:i<6?"1px solid var(--border)":"none"}}>
              <span style={{fontSize:12,fontFamily:"var(--font)",fontWeight:600}}>{d.label}</span>
              <span style={{fontSize:11,fontFamily:"var(--font)",fontWeight:600,color:statusColor}}>{status}</span>
            </div>
          );
        })}
      </div>

      {/* Stats */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
        {[{label:"Days Trained",value:daysTrained||"—"},{label:"Total Volume",value:totalLoad?`${Math.round(totalLoad).toLocaleString()} lbs`:"—"},{label:"Heaviest Lift",value:heaviest?`${heaviest} lbs`:"—"},{label:"Most Trained",value:topMuscle?`${topMuscle[0]} (${topMuscle[1]}×)`:"—"}].map(s=>(
          <div key={s.label} style={{background:"var(--card-bg)",border:"1px solid var(--border)",borderRadius:12,padding:"12px 14px"}}>
            <div style={{fontSize:9,color:"var(--text-muted)",fontFamily:"var(--font)",textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:4}}>{s.label}</div>
            <div style={{fontSize:15,fontWeight:800,fontFamily:"var(--font)"}}>{s.value}</div>
          </div>
        ))}
      </div>

      {/* Coverage Gaps */}
      {gaps.length>0&&(
        <div style={{background:"var(--card-bg)",border:"1px solid var(--border)",borderRadius:12,padding:"14px"}}>
          <div style={{fontSize:11,fontWeight:700,fontFamily:"var(--font)",color:"var(--text-muted)",textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:8}}>Coverage Gaps ({gaps.length})</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
            {gaps.map(g=><span key={g} style={{fontSize:10,padding:"3px 8px",borderRadius:5,background:"rgba(239,68,68,0.08)",color:"rgba(239,68,68,0.65)",fontFamily:"var(--font)",fontWeight:600}}>{g}</span>)}
          </div>
        </div>
      )}
    </div>
  );
}

function MuscleCoverage({ exercises, addons }) {
  const covered = new Set();

  Object.values(exercises).forEach(exs=>{(exs||[]).forEach(ex=>{if(ex.name){const l=getLib(ex.name);if(l)l.target.split(" / ").forEach(m=>{const mt=m.trim();covered.add(mt);hitCount[mt]=(hitCount[mt]||0)+1;});}});});
  Object.values(addons||{}).forEach(addon=>{(addon.exercises||[]).forEach(ex=>{if(ex.name){const l=getLib(ex.name);if(l)l.target.split(" / ").forEach(m=>{const mt=m.trim();covered.add(mt);hitCount[mt]=(hitCount[mt]||0)+1;});}});});
  const cats = {
    "Upper Push":["Chest","Upper Chest","Front Delts","Lateral Delts","Shoulders","Triceps"],

  return (

        <div key={cat} style={{marginBottom:14}}>

          <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
            {muscles.map(m=>{const hit=covered.has(m);return(

      ))}
    </div>
  );
}

function HistoryView({ history }) {
  const exerciseNames = [...new Set(history.map(h=>h.exercise))].sort();
  const [selected, setSelected] = useState(exerciseNames[0]||"");
  const entries = history.filter(h=>h.exercise===selected).sort((a,b)=>a.date.localeCompare(b.date));
  const maxW = entries.length?Math.max(...entries.map(e=>parseFloat(e.weight)||0)):1;

  return (
    <div>
      {exerciseNames.length===0?<div style={{textAlign:"center",padding:40,color:"var(--text-muted)",fontFamily:"var(--font)"}}>No workout history yet. Complete workouts and roll over a week to see trends.</div>:(
      <>
        <select value={selected} onChange={e=>setSelected(e.target.value)} style={{width:"100%",boxSizing:"border-box",background:"var(--input-bg)",border:"1px solid var(--border)",borderRadius:10,padding:"10px 14px",fontSize:14,color:"var(--text-primary)",fontFamily:"var(--font)",marginBottom:14,outline:"none"}}>
          {exerciseNames.map(n=><option key={n}>{n}</option>)}
        </select>
        {entries.length>1&&(
          <div style={{background:"var(--card-bg)",border:"1px solid var(--border)",borderRadius:14,padding:16,marginBottom:12}}>
            <div style={{display:"flex",alignItems:"flex-end",gap:6,height:110,justifyContent:"center"}}>
              {entries.slice(-12).map((e,i,arr)=>{const pct=(parseFloat(e.weight)||0)/maxW*100;return(
                <div key={i} style={{display:"flex",flexDirection:"column",alignItems:"center",flex:1,maxWidth:40}}>
                  <div style={{fontSize:10,fontWeight:700,fontFamily:"var(--font)",marginBottom:3}}>{e.weight}</div>
                  <div style={{width:"100%",height:`${pct}%`,minHeight:3,background:i===arr.length-1?"#22c55e":"#6366f1",borderRadius:"5px 5px 0 0",transition:"height 0.3s"}}/>
                  <div style={{fontSize:8,color:"var(--text-muted)",fontFamily:"var(--font)",marginTop:3}}>{e.date.slice(5)}</div>
                </div>
              );})}
            </div>
            {entries.length>=2&&(()=>{const first=parseFloat(entries[0].weight)||0;const last=parseFloat(entries[entries.length-1].weight)||0;const diff=last-first;const pct=first?((diff/first)*100).toFixed(1):0;return(
              <div style={{textAlign:"center",marginTop:10,fontSize:11,fontFamily:"var(--font)",color:diff>=0?"#22c55e":"#ef4444"}}>
                {diff>=0?"↑":"↓"} {Math.abs(diff)} lbs ({diff>=0?"+":""}{pct}%) over {entries.length} sessions
              </div>
            );})()}
          </div>
        )}
        {entries.slice().reverse().map((e,i)=>(
          <div key={i} style={{background:"var(--card-bg)",border:"1px solid var(--border)",borderRadius:10,padding:"10px 14px",marginBottom:5,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <div style={{fontSize:12,fontFamily:"var(--font)",color:"var(--text-muted)"}}>{e.date}</div>
              <div style={{fontSize:11,fontFamily:"var(--font)",color:"var(--text-muted)"}}>{e.reps||"—"}</div>
              {e.notes&&<div style={{fontSize:10,fontFamily:"var(--font)",color:"var(--text-muted)",fontStyle:"italic",marginTop:2}}>{e.notes}</div>}
            </div>
            <div style={{fontSize:18,fontWeight:800,fontFamily:"var(--font)"}}>{e.weight}<span style={{fontSize:11,fontWeight:400,color:"var(--text-muted)"}}> lbs</span></div>
          </div>
        ))}
      </>)}
    </div>
  );
}

function CatalogView() {

    const s = search.toLowerCase();
    const matchS = !s || e.name.toLowerCase().includes(s) || e.target.toLowerCase().includes(s) || e.equip.toLowerCase().includes(s);
    const matchF = filter==="All" || e.focus===filter;

  return (
    <div>
      <input type="text" placeholder="Search exercises, muscles, equipment..." value={search} onChange={e=>setSearch(e.target.value)}
        style={{width:"100%",boxSizing:"border-box",background:"var(--input-bg)",border:"1px solid var(--border)",borderRadius:10,padding:"10px 14px",fontSize:14,color:"var(--text-primary)",fontFamily:"var(--font)",marginBottom:8,outline:"none"}}/>
      <div style={{display:"flex",gap:4,marginBottom:12,overflowX:"auto",paddingBottom:4}}>

      </div>
      <div style={{fontSize:11,color:"var(--text-muted)",fontFamily:"var(--font)",marginBottom:6}}>{filtered.length} exercises</div>
      {filtered.map(ex=>(
        <div key={ex.name} style={{background:"var(--card-bg)",border:"1px solid var(--border)",borderRadius:10,padding:"10px 14px",marginBottom:5}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{fontWeight:700,fontSize:13,fontFamily:"var(--font)"}}>{ex.name}</span>
            <span style={{fontSize:9,padding:"2px 7px",borderRadius:4,fontWeight:700,fontFamily:"var(--font)",background:ex.ci==="C"?"rgba(99,102,241,0.12)":"rgba(168,85,247,0.12)",color:ex.ci==="C"?"#818cf8":"#c084fc"}}>{ex.ci==="C"?"Compound":"Isolation"}</span>
          </div>
          <div style={{fontSize:11,color:"#818cf8",fontFamily:"var(--font)",marginTop:2}}>{ex.target}</div>

        </div>
      ))}

  );
}

function BodyweightView({ bodyweight, setBodyweight }) {
  const [newWeight, setNewWeight] = useState("");
  const [newDate, setNewDate] = useState(fmtISO(new Date()));

  const sorted = [...bodyweight].sort((a,b) => a.date.localeCompare(b.date));
  const latest = sorted[sorted.length - 1];
  const oldest = sorted[0];

  const addEntry = () => {
    const w = parseFloat(newWeight);
    if (!w || w <= 0) return;
    const filtered = bodyweight.filter(bw => bw.date !== newDate);
    setBodyweight([...filtered, { date: newDate, weight: w }]);
    setNewWeight("");
  };

  const removeEntry = (date) => {
    setBodyweight(bodyweight.filter(bw => bw.date !== date));
  };

  const maxW = sorted.length ? Math.max(...sorted.map(s => s.weight)) : 1;
  const minW = sorted.length ? Math.min(...sorted.map(s => s.weight)) : 0;
  const range = maxW - minW || 1;

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <div>
          <div style={{fontSize:11,color:"var(--accent)",fontWeight:700,fontFamily:"var(--font)",textTransform:"uppercase",letterSpacing:"0.5px"}}>Bodyweight</div>
          <div style={{fontSize:11,color:"var(--text-muted)",fontFamily:"var(--font)"}}>{sorted.length} entries</div>
        </div>
        {latest && (
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:22,fontWeight:800,fontFamily:"var(--font)"}}>{latest.weight}<span style={{fontSize:11,fontWeight:500,color:"var(--text-muted)"}}> lbs</span></div>
            {oldest && oldest !== latest && (()=>{const diff = latest.weight - oldest.weight; return (
              <div style={{fontSize:10,fontFamily:"var(--font)",color:diff>=0?"#22c55e":"#ef4444"}}>
                {diff>=0?"↑":"↓"} {Math.abs(diff).toFixed(1)} lbs all time
              </div>
            );})()}
          </div>
        )}
      </div>

      {/* Add new entry */}
      <div style={{background:"var(--card-bg)",border:"1px solid var(--border)",borderRadius:12,padding:"12px",marginBottom:12}}>
        <div style={{fontSize:10,fontWeight:700,fontFamily:"var(--font)",color:"var(--text-muted)",textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:8}}>Log weight</div>
        <div style={{display:"flex",gap:6}}>
          <input type="date" value={newDate} onChange={e=>setNewDate(e.target.value)} style={{flex:1,background:"var(--input-bg)",border:"1px solid var(--border)",borderRadius:8,padding:"8px 10px",fontSize:13,color:"var(--text-primary)",fontFamily:"var(--font)",outline:"none"}}/>
          <input type="number" inputMode="decimal" placeholder="lbs" value={newWeight} onChange={e=>setNewWeight(e.target.value)} style={{width:90,background:"var(--input-bg)",border:"1px solid var(--border)",borderRadius:8,padding:"8px 10px",fontSize:13,fontWeight:700,color:"var(--text-primary)",fontFamily:"var(--font)",outline:"none"}}/>
          <button onClick={addEntry} style={{background:"var(--accent)",border:"none",borderRadius:8,padding:"8px 14px",fontSize:12,fontWeight:700,color:"#fff",fontFamily:"var(--font)",cursor:"pointer"}}>Add</button>
        </div>
      </div>

      {/* Trend chart */}
      {sorted.length > 1 && (
        <div style={{background:"var(--card-bg)",border:"1px solid var(--border)",borderRadius:12,padding:"12px",marginBottom:12}}>
          <div style={{display:"flex",alignItems:"flex-end",gap:3,height:100}}>
            {sorted.slice(-30).map((entry, i, arr) => {
              const pct = ((entry.weight - minW) / range) * 80 + 20;
              return (
                <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"flex-end"}}>
                  <div style={{width:"100%",maxWidth:12,height:`${pct}%`,background:i===arr.length-1?"#22c55e":"var(--accent)",borderRadius:"3px 3px 0 0",minHeight:3}}/>
                </div>
              );
            })}
          </div>

//  - useTimer, primeAudio, beep, buzz, playEndCue, formatMMSS, tBtn
//    (all defined in 01_timer_module.jsx — make sure that module is
//     pasted ABOVE this one)

//
// INTEGRATION:

// Hold type options for the dropdown
const HANGBOARD_HOLDS = [
  "20mm Edge",
  "15mm Edge",
  "10mm Edge",
  "8mm Edge",
  "6mm Edge",
  "Jug",
  "Sloper",
  "Pinch",
  "3-Finger Drag",
  "3-Finger Half Crimp",
  "4-Finger Open",
  "4-Finger Half Crimp",
  "Pocket (2-finger)",
  "Pocket (3-finger)",
  "Mono",
  "Custom",
];

// Default state for a new protocol
const newProtocol = () => ({
  id: Date.now() + Math.random(),
  hold: "20mm Edge",
  customHold: "",
  hangSec: 7,
  restSec: 3,
  rounds: 6,
});

// ─── HangboardView ─────────────────────────────────────────────────
function HangboardView() {
  const [protocols, setProtocols] = useState([newProtocol()]);
  const [saved, setSaved] = useState([]);          // saved named presets
  const [history, setHistory] = useState([]);      // session log
  const [active, setActive] = useState(null);      // currently running protocol

  // Load on mount
  useEffect(() => {
    (async () => {
      const s = await loadData("hangboard_saved", []);
      const h = await loadData("hangboard_history", []);
      setSaved(s); setHistory(h);
    })();
  }, []);

  // Persist saved + history
  useEffect(() => { saveData("hangboard_saved", saved); }, [saved]);
  useEffect(() => { saveData("hangboard_history", history); }, [history]);

  const updateProtocol = (id, patch) => {
    setProtocols(ps => ps.map(p => p.id === id ? { ...p, ...patch } : p));
  };
  const deleteProtocol = (id) => {
    setProtocols(ps => ps.filter(p => p.id !== id));
  };
  const addProtocol = () => {
    setProtocols(ps => [...ps, newProtocol()]);
  };
  const startProtocol = (p) => {
    primeAudio();
    setActive(p);
  };
  const savePreset = (p) => {
    const name = prompt("Name this protocol:", `${p.hangSec}:${p.restSec} ${p.hold}`);
    if (!name) return;
    setSaved(s => [...s, { ...p, id: Date.now(), name }]);
  };
  const loadPreset = (preset) => {
    setProtocols(ps => [...ps, { ...preset, id: Date.now() + Math.random() }]);
  };
  const deletePreset = (id) => {
    setSaved(s => s.filter(p => p.id !== id));
  };

  const onSessionComplete = (summary) => {
    setHistory(h => [{ ...summary, date: new Date().toISOString() }, ...h]);
    setActive(null);
  };

  return (
    <div style={{ paddingBottom: 20 }}>
      <div style={{ fontSize: 18, fontWeight: 800, fontFamily: "var(--font)", marginBottom: 4 }}>Hangboard</div>
      <div style={{ fontSize: 11, color: "var(--text-muted)", fontFamily: "var(--font)", marginBottom: 14 }}>
        Build a protocol. Tap Start. Hands-free timer cycles hang → rest for your rounds.
      </div>

      {/* Saved presets */}
      {saved.length > 0 && (
        <div style={{ marginBottom: 14 }}>
          <div style={{ fontSize: 10, fontWeight: 700, color: "var(--text-muted)", textTransform: "uppercase", letterSpacing: "0.5px", fontFamily: "var(--font)", marginBottom: 6 }}>
            Saved Protocols
          </div>
          <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
            {saved.map(p => (
              <div key={p.id} style={{
                display: "flex", alignItems: "center", gap: 4,
                background: "var(--card-bg)", border: "1px solid var(--border)",
                borderRadius: 7, padding: "5px 8px 5px 10px",
              }}>
                <button onClick={() => loadPreset(p)} style={{
                  background: "none", border: "none", color: "var(--text-primary)",
                  fontFamily: "var(--font)", fontSize: 11, fontWeight: 600, cursor: "pointer",
                }}>{p.name}</button>
                <button onClick={() => deletePreset(p.id)} style={{
                  background: "none", border: "none", color: "var(--text-muted)",
                  fontSize: 12, cursor: "pointer", padding: "0 4px", opacity: 0.5,
                }}>✕</button>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Protocol cards */}
      {protocols.map((p, idx) => (
        <ProtocolCard
          key={p.id}
          protocol={p}
          canDelete={protocols.length > 1}
          onUpdate={(patch) => updateProtocol(p.id, patch)}
          onDelete={() => deleteProtocol(p.id)}
          onStart={() => startProtocol(p)}
          onSave={() => savePreset(p)}
        />
      ))}

      <button onClick={addProtocol} style={{
        width: "100%", padding: "10px", border: "1px dashed var(--border)",
        borderRadius: 10, background: "transparent", color: "var(--text-muted)",
        fontFamily: "var(--font)", fontSize: 12, cursor: "pointer", marginTop: 6,
      }}>+ Add Protocol</button>

      {/* Session history */}
      {history.length > 0 && (
        <div style={{ marginTop: 22 }}>
          <div style={{ fontSize: 11, fontWeight: 700, color: "var(--text-muted)", textTransform: "uppercase", letterSpacing: "0.5px", fontFamily: "var(--font)", marginBottom: 8 }}>
            Recent Sessions
          </div>
          {history.slice(0, 10).map((h, i) => (
            <div key={i} style={{
              background: "var(--card-bg)", border: "1px solid var(--border)",
              borderRadius: 10, padding: "10px 12px", marginBottom: 6,
              display: "flex", justifyContent: "space-between", alignItems: "center",
            }}>
              <div>
                <div style={{ fontSize: 13, fontWeight: 700, fontFamily: "var(--font)" }}>
                  {h.hold} — {h.hangSec}s / {h.restSec}s
                </div>
                <div style={{ fontSize: 10, color: "var(--text-muted)", fontFamily: "var(--font)" }}>
                  {new Date(h.date).toLocaleDateString()} • {h.completedRounds}/{h.rounds} rounds
                </div>
              </div>
              <div style={{
                fontSize: 10, fontWeight: 700, fontFamily: "var(--font)",
                color: h.completedRounds === h.rounds ? "#22c55e" : "#f59e0b",
                background: h.completedRounds === h.rounds ? "rgba(34,197,94,0.12)" : "rgba(245,158,11,0.12)",
                padding: "3px 8px", borderRadius: 5,
              }}>
                {h.completedRounds === h.rounds ? "Complete" : "Partial"}
              </div>
            </div>
          ))}
        </div>
      )}

      {/* Active session overlay */}
      {active && (
        <HangboardSession
          protocol={active}
          onComplete={onSessionComplete}
          onCancel={() => setActive(null)}
        />
      )}
    </div>
  );
}

// ─── ProtocolCard ──────────────────────────────────────────────────
function ProtocolCard({ protocol, canDelete, onUpdate, onDelete, onStart, onSave }) {
  const isCustom = protocol.hold === "Custom";
  return (
    <div style={{
      background: "var(--card-bg)", border: "1px solid var(--border)",
      borderRadius: 14, padding: "14px", marginBottom: 10, position: "relative",
    }}>
      {canDelete && (
        <button onClick={onDelete} style={{
          position: "absolute", top: 8, right: 8,
          background: "none", border: "none", color: "var(--text-muted)",
          fontSize: 14, cursor: "pointer", padding: 4, opacity: 0.5,
        }}>✕</button>
      )}

      {/* Hold */}
      <div style={{ marginBottom: 10 }}>
        <Label>Hold</Label>
        <select
          value={protocol.hold}
          onChange={(e) => onUpdate({ hold: e.target.value })}
          style={selectStyle}
        >
          {HANGBOARD_HOLDS.map(h => <option key={h} value={h}>{h}</option>)}
        </select>
        {isCustom && (
          <input
            type="text"
            placeholder="Custom hold description"
            value={protocol.customHold}
            onChange={(e) => onUpdate({ customHold: e.target.value })}

          />
        )}
      </div>

      {/* Hang / Rest / Rounds row */}
      <div style={{ display: "flex", gap: 8, marginBottom: 12 }}>
        <NumField label="Hang (sec)" value={protocol.hangSec}
          onChange={(v) => onUpdate({ hangSec: v })} />
        <NumField label="Rest (sec)" value={protocol.restSec}
          onChange={(v) => onUpdate({ restSec: v })} />
        <NumField label="Rounds" value={protocol.rounds}
          onChange={(v) => onUpdate({ rounds: v })} />
      </div>

      {/* Actions */}
      <div style={{ display: "flex", gap: 8 }}>
        <button onClick={onStart} style={{
          flex: 1, padding: "12px", background: "#22c55e", border: "none",
          borderRadius: 10, color: "#fff", fontFamily: "var(--font)",
          fontSize: 14, fontWeight: 800, cursor: "pointer",
          letterSpacing: "0.5px",
        }}>▶ START</button>
        <button onClick={onSave} style={{
          padding: "12px 14px", background: "var(--input-bg)",
          border: "1px solid var(--border)", borderRadius: 10,
          color: "var(--text-primary)", fontFamily: "var(--font)",
          fontSize: 12, fontWeight: 700, cursor: "pointer",
        }}>Save</button>
      </div>

      {/* Preview */}
      <div style={{ marginTop: 10, fontSize: 10, color: "var(--text-muted)", fontFamily: "var(--font)", textAlign: "center" }}>
        Total: {formatMMSS(protocol.rounds * (protocol.hangSec + protocol.restSec) - protocol.restSec)} 
        {" • "}{protocol.rounds} rounds
      </div>
    </div>
  );
}

// ─── Small form helpers ────────────────────────────────────────────

// ─── HangboardSession (active running overlay) ─────────────────────
function HangboardSession({ protocol, onComplete, onCancel }) {
  // phase: "hang" | "rest" | "done"
  const [phase, setPhase] = useState("hang");
  const [round, setRound] = useState(1);
  const [muted, setMuted] = useState(false);
  const [paused, setPaused] = useState(false);
  const [remaining, setRemaining] = useState(protocol.hangSec);
  const endTimeRef = useRef(Date.now() + protocol.hangSec * 1000);
  const rafRef = useRef(null);
  const wakeLockRef = useRef(null);

  // Hold label (accounts for custom)
  const holdLabel = protocol.hold === "Custom" && protocol.customHold
    ? protocol.customHold : protocol.hold;

  // Wake lock
  useEffect(() => {
    requestWakeLock(wakeLockRef);
    return () => releaseWakeLock(wakeLockRef);
  }, []);

  // Phase transition handler
  const goNextPhase = useCallback(() => {
    if (phase === "hang") {
      // Hang just ended → go to rest (unless this was the last round)
      if (round >= protocol.rounds) {
        // Done — no rest after last hang
        setPhase("done");
        playEndCue(muted);
        onComplete({
          hold: holdLabel,
          hangSec: protocol.hangSec,
          restSec: protocol.restSec,
          rounds: protocol.rounds,
          completedRounds: protocol.rounds,
        });
        return;
      }
      setPhase("rest");
      setRemaining(protocol.restSec);
      endTimeRef.current = Date.now() + protocol.restSec * 1000;
      if (!muted) { beep(440, 0.15, 0.3); buzz(100); }  // low beep = rest
    } else if (phase === "rest") {
      // Rest just ended → next hang
      setRound(r => r + 1);
      setPhase("hang");
      setRemaining(protocol.hangSec);
      endTimeRef.current = Date.now() + protocol.hangSec * 1000;
      if (!muted) { beep(880, 0.2, 0.35); buzz(200); }  // high beep = hang
    }
  }, [phase, round, protocol, muted, holdLabel, onComplete]);

  // Tick loop
  useEffect(() => {
    if (paused || phase === "done") return;
    const tick = () => {
      const left = (endTimeRef.current - Date.now()) / 1000;
      if (left <= 0) {
        goNextPhase();
        return;
      }
      setRemaining(left);
      rafRef.current = requestAnimationFrame(tick);
    };
    rafRef.current = requestAnimationFrame(tick);
    return () => { if (rafRef.current) cancelAnimationFrame(rafRef.current); };
  }, [paused, phase, goNextPhase]);

  const pauseResume = () => {
    if (paused) {
      endTimeRef.current = Date.now() + remaining * 1000;
      setPaused(false);
    } else {
      setPaused(true);
    }
  };

  const endEarly = () => {
    onComplete({
      hold: holdLabel,
      hangSec: protocol.hangSec,
      restSec: protocol.restSec,
      rounds: protocol.rounds,
      completedRounds: phase === "rest" ? round : Math.max(0, round - 1),
    });
  };

  // Colors per phase
  const phaseColors = {
    hang: { bg: "#14532d", accent: "#22c55e", text: "HANG" },
    rest: { bg: "#78350f", accent: "#f59e0b", text: "REST" },
    done: { bg: "#1e3a8a", accent: "#60a5fa", text: "DONE" },
  }[phase];

  return (
    <div style={{
      position: "fixed", inset: 0, zIndex: 500,
      background: phaseColors.bg,
      display: "flex", flexDirection: "column",
      alignItems: "center", justifyContent: "space-between",
      padding: "env(safe-area-inset-top) 20px env(safe-area-inset-bottom)",
      fontFamily: "var(--font)",
      transition: "background 0.25s",
    }}>
      {/* Top bar */}
      <div style={{ width: "100%", display: "flex", justifyContent: "space-between", alignItems: "center", paddingTop: 16 }}>
        <button onClick={onCancel} style={{
          background: "rgba(0,0,0,0.25)", border: "none", color: "#fff",
          borderRadius: 8, padding: "8px 12px", fontSize: 13, fontWeight: 700,
          fontFamily: "var(--font)", cursor: "pointer",
        }}>Cancel</button>
        <button onClick={() => setMuted(m => !m)} style={{
          background: "rgba(0,0,0,0.25)", border: "none", color: "#fff",
          borderRadius: 8, padding: "8px 12px", fontSize: 16, cursor: "pointer",
        }}>{muted ? "🔇" : "🔊"}</button>
      </div>

      {/* Hold + round info */}
      <div style={{ textAlign: "center" }}>
        <div style={{ fontSize: 18, fontWeight: 700, color: "rgba(255,255,255,0.7)", marginBottom: 4 }}>
          {holdLabel}
        </div>
        <div style={{ fontSize: 13, fontWeight: 600, color: "rgba(255,255,255,0.5)" }}>
          Round {Math.min(round, protocol.rounds)} of {protocol.rounds}
        </div>
      </div>

      {/* Huge timer */}
      <div style={{ textAlign: "center" }}>
        <div style={{
          fontSize: 22, fontWeight: 800, color: phaseColors.accent,
          textTransform: "uppercase", letterSpacing: "4px", marginBottom: 12,
        }}>{phaseColors.text}</div>
        <div style={{
          fontSize: 120, fontWeight: 800, color: "#fff", lineHeight: 1,
          fontVariantNumeric: "tabular-nums",
        }}>
          {phase === "done" ? "✓" : formatMMSS(remaining)}
        </div>
        {paused && (
          <div style={{ fontSize: 14, color: "rgba(255,255,255,0.6)", marginTop: 10, fontWeight: 600 }}>
            Paused
          </div>
        )}
      </div>

      {/* Controls */}
      <div style={{ width: "100%", display: "flex", gap: 10, paddingBottom: 20 }}>
        {phase !== "done" ? (
          <>
            <button onClick={pauseResume} style={sessionBtn("rgba(255,255,255,0.15)")}>
              {paused ? "Resume" : "Pause"}
            </button>
            <button onClick={endEarly} style={sessionBtn("rgba(0,0,0,0.35)")}>
              End
            </button>
          </>
        ) : (
          <button onClick={onCancel} style={sessionBtn("rgba(255,255,255,0.2)")}>
            Close
          </button>
        )}
      </div>
    </div>
  );
}

function AddOnView({ addonKey, label, data, onChange, history, monday, onExerciseDone }) {
  const [pickerIdx, setPickerIdx] = useState(null);
  const exercises = data.exercises || [{name:"",weight:"",sets:["","",""],reps:"",notes:"",done:false},{name:"",weight:"",sets:["","",""],reps:"",notes:"",done:false},{name:"",weight:"",sets:["","",""],reps:"",notes:"",done:false}];
  const doneCount = exercises.filter(e=>e.done).length;
  const total = exercises.filter(e=>e.name).length;

  const getLastSession = (exName) => {
    if (!exName) return null;
    const prev = history.filter(h=>h.exercise===exName && h.date < fmtISO(monday)).sort((a,b)=>b.date.localeCompare(a.date));
    if (prev.length === 0) return null;
    const p = prev[0];
    const sets = Array.isArray(p.sets) ? p.sets : (p.reps ? p.reps.split("*").map(s=>s.trim()) : []);
    return { weight: p.weight, reps: p.reps, sets };
  };

  const updateExercises = (exs) => onChange({...data, exercises:exs});

  const handleChange = (i, updated) => {
    const wasNotDone = !exercises[i]?.done;
    const nowDone = updated.done;
    const n = [...exercises]; n[i] = updated;
    updateExercises(n);
    if (wasNotDone && nowDone && updated.name && onExerciseDone) {
      onExerciseDone(updated);
    }
  };

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <div>
          <div style={{fontSize:11,color:"#f59e0b",fontWeight:700,fontFamily:"var(--font)",textTransform:"uppercase",letterSpacing:"0.5px"}}>{label} Add-On</div>
          <div style={{fontSize:11,color:"var(--text-muted)",fontFamily:"var(--font)"}}>{doneCount}/{total} done</div>
        </div>
      </div>
      {exercises.map((ex,i)=>(
        <div key={i} style={{position:"relative"}}>
          <ExerciseCard exercise={ex} onChange={u=>handleChange(i,u)} lastSession={getLastSession(ex.name)} onPickExercise={()=>setPickerIdx(i)} onSetComplete={onExerciseDone}/>
        </div>
      ))}
      <button onClick={()=>updateExercises([...exercises,{name:"",weight:"",sets:["","",""],reps:"",notes:"",done:false}])} style={{width:"100%",padding:10,border:"1px dashed var(--border)",borderRadius:10,background:"transparent",color:"var(--text-muted)",fontFamily:"var(--font)",fontSize:12,cursor:"pointer",marginTop:4}}>+ Add Exercise</button>
      {/* PT */}
      <div style={{background:"var(--card-bg)",border:"1px solid var(--border)",borderRadius:14,padding:"12px 14px",marginTop:10}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontWeight:700,fontSize:13,fontFamily:"var(--font)"}}>PT</span>
          <button onClick={()=>onChange({...data,pt:!data.pt})} style={{width:30,height:30,borderRadius:7,border:data.pt?"none":"2px solid var(--border)",background:data.pt?"#22c55e":"transparent",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}}>
            {data.pt&&<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="3" strokeLinecap="round"><polyline points="20 6 9 17 4 12"/></svg>}
          </button>
        </div>
      </div>
      {pickerIdx!==null && <ExercisePicker onSelect={name=>{const n=[...exercises];n[pickerIdx]={...n[pickerIdx],name};updateExercises(n);}} onClose={()=>setPickerIdx(null)}/>}
    </div>
  );
}

    recovery: { done:false, notes:"" },
    addons: { grip:{exercises:[{name:"",weight:"",sets:["","",""],reps:"",notes:"",done:false},{name:"",weight:"",sets:["","",""],reps:"",notes:"",done:false},{name:"",weight:"",sets:["","",""],reps:"",notes:"",done:false}],pt:false}, snow:{exercises:[{name:"",weight:"",sets:["","",""],reps:"",notes:"",done:false},{name:"",weight:"",sets:["","",""],reps:"",notes:"",done:false},{name:"",weight:"",sets:["","",""],reps:"",notes:"",done:false}],pt:false} },
    pt: { tue:false, thu:false, sat:false },
  });
  const [history, setHistory] = useState([]);
  const [bodyweight, setBodyweight] = useState([]); // [{date, weight}]

  // Load
  useEffect(()=>{
    (async()=>{
      const s = await loadData(STORAGE_KEYS.state, null);
      const h = await loadData(STORAGE_KEYS.history, []);
      const bw = await loadData(STORAGE_KEYS.bodyweight, []);
      const settings = await loadData("wt-settings", null);
      if(s) setState(s);
      if(h) setHistory(h);
      if(bw) setBodyweight(bw);
      if(settings) {
        if(typeof settings.restDuration === 'number') setRestDuration(settings.restDuration);
        if(typeof settings.autoAdvance === 'boolean') setAutoAdvance(settings.autoAdvance);
        if(typeof settings.timerEnabled === 'boolean') setTimerEnabled(settings.timerEnabled);
      }
      setLoaded(true);
    })();
  },[]);

  // Auto-save
  const saveTimer = useRef(null);
  useEffect(()=>{
    if(!loaded) return;
    if(saveTimer.current) clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(()=>{
      saveData(STORAGE_KEYS.state, state);
      saveData(STORAGE_KEYS.history, history);
      saveData(STORAGE_KEYS.bodyweight, bodyweight);
      saveData("wt-settings", { restDuration, autoAdvance, timerEnabled });
    }, 800);
  },[state,history,bodyweight,restDuration,autoAdvance,timerEnabled,loaded]);

  // PR detection
  const checkForPR = useCallback((exName, weight) => {
    if (!exName || !weight) return false;
    const w = parseFloat(weight);
    if (isNaN(w) || w <= 0) return false;
    const prevBest = history.filter(h => h.exercise === exName).reduce((max, h) => {
      const hw = parseFloat(h.weight) || 0;
      return hw > max ? hw : max;
    }, 0);
    return w > prevBest;
  }, [history]);

  // Export/import
  const exportData = useCallback(() => {
    const data = { state, history, bodyweight, settings: { restDuration, autoAdvance, timerEnabled }, exportedAt: new Date().toISOString(), version: 1 };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `hybrid-training-backup-${fmtISO(new Date())}.json`;
    a.click();
    URL.revokeObjectURL(url);
  }, [state, history, bodyweight, restDuration, autoAdvance, timerEnabled]);

  const importData = useCallback((file) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const data = JSON.parse(e.target.result);
        if (data.state) setState(data.state);
        if (data.history) setHistory(data.history);
        if (data.bodyweight) setBodyweight(data.bodyweight);
        if (data.settings) {
          if (typeof data.settings.restDuration === 'number') setRestDuration(data.settings.restDuration);
          if (typeof data.settings.autoAdvance === 'boolean') setAutoAdvance(data.settings.autoAdvance);
          if (typeof data.settings.timerEnabled === 'boolean') setTimerEnabled(data.settings.timerEnabled);
        }
        alert("Backup restored successfully!");
      } catch (err) {
        alert("Failed to import: " + err.message);
      }
    };
    reader.readAsText(file);
  }, []);

  // Add previous week workouts directly to history
  const addPreviousWeekWorkouts = useCallback((entries) => {
    const newEntries = entries.filter(e => e.exercise && e.date).map(e => {
      const sets = Array.isArray(e.sets) ? e.sets : (e.reps ? e.reps.split("*").map(s=>s.trim()) : []);

        date: e.date,
        day: new Date(e.date+"T00:00:00").toLocaleDateString('en-US',{weekday:'long'}),

        weight: e.weight || "",
        reps: setsToRepsString(sets) || e.reps || "",

        notes: e.notes || "",
        target: getLib(e.exercise)?.target || "",

    });
    setHistory(prev => [...prev, ...newEntries]);
    setShowAddPrevWeek(false);
  }, []);

  const monday = new Date(state.weekStart+"T00:00:00");

  // Weekly rollover
  const doRollover = useCallback(()=>{
    // 1. Archive completed exercises to history
    const newHistory = [...history];
    const weekStart = state.weekStart;
    ["tue","thu","sat"].forEach((k,ki)=>{
      const offset = [1,3,5][ki];
      const dayDate = fmtISO(dateForDay(monday, offset));
      (state.exercises[k]||[]).forEach(ex=>{
        if(ex.done && ex.name) {
          const sets = getSets(ex);
          newHistory.push({ date:dayDate, day:DAYS_CONFIG.find(d=>d.key===k)?.label||k, exercise:ex.name, weight:ex.weight||"", reps:setsToRepsString(sets)||ex.reps||"", sets, notes:ex.notes||"", target:getLib(ex.name)?.target||"" });
        }
      });
    });
    // Addon history
    Object.entries(state.addons||{}).forEach(([ak,ad])=>{
      (ad.exercises||[]).forEach(ex=>{
        if(ex.done && ex.name) {
          const sets = getSets(ex);
          newHistory.push({ date:weekStart, day:ak, exercise:ex.name, weight:ex.weight||"", reps:setsToRepsString(sets)||ex.reps||"", sets, notes:ex.notes||"", target:getLib(ex.name)?.target||"" });
        }
      });
    });

    // 2. Build new state: keep exercise selections, reset all inputs to 3 empty sets
    const newMonday = getMonday(new Date(monday.getTime() + 7*86400000));
    const newExercises = {};
    ["tue","thu","sat"].forEach(k=>{
      newExercises[k] = (state.exercises[k]||[]).map(ex=>({
        name: ex.name, weight: "", sets: ["","",""], reps:"", notes:"", done:false,
      }));
    });

    const newAddons = {};
    Object.entries(state.addons||{}).forEach(([ak,ad])=>{
      newAddons[ak] = { exercises:(ad.exercises||[]).map(ex=>({name:ex.name,weight:"",sets:["","",""],reps:"",notes:"",done:false})), pt:false };
    });

    setState({
      weekStart: fmtISO(newMonday),
      exercises: newExercises,
      cardio:{ mon:{mode:"Recovery Walk",done:false,notes:"",pt:false,ptNotes:"",duration:"60 min",effort:"Zone 2"}, wed:{mode:"Zone 2 Cardio",done:false,notes:"",pt:false,ptNotes:"",duration:"60 min",effort:"Zone 2"}, fri:{mode:"",done:false,notes:"",pt:false,ptNotes:"",duration:"60 min",effort:"Zone 2"} },
      recovery:{done:false,notes:""},

  // Handler for when an exercise is marked done - triggers rest timer and PR detection

      primeAudio();

      setTimer({ duration: dur, key: Date.now(), label: exercise.name });

    if (exercise.weight && checkForPR(exercise.name, exercise.weight)) {
      setPrToast({ exercise: exercise.name, weight: exercise.weight });

  const tabs = [

    {key:"today",label:"Today",icon:"📋"},

    {key:"hangs",label:"Hangs",icon:"🪨"},
    {key:"history",label:"History",icon:"📈"},
    {key:"catalog",label:"Catalog",icon:"📚"},
  ];

  return (
    <div style={{"--bg":"#0f1115","--card-bg":"#191c22","--border":"#2a2e37","--text-primary":"#e8eaed","--text-muted":"#6b7280","--accent":"#6366f1","--input-bg":"#1e2028","--font":"'DM Sans',sans-serif",fontFamily:"var(--font)",background:"var(--bg)",minHeight:"100vh",maxWidth:480,margin:"0 auto",color:"var(--text-primary)",paddingBottom:56}}>

      {/* Rollover confirm */}
      {showRollConfirm&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:20}} onClick={()=>setShowRollConfirm(false)}>
          <div onClick={e=>e.stopPropagation()} style={{background:"var(--bg)",border:"1px solid var(--border)",borderRadius:16,padding:24,maxWidth:340,width:"100%"}}>
            <div style={{fontWeight:800,fontSize:16,fontFamily:"var(--font)",marginBottom:8}}>Roll Over Week?</div>
            <div style={{fontSize:12,color:"var(--text-muted)",fontFamily:"var(--font)",marginBottom:16,lineHeight:1.5}}>This will archive all completed workouts to history, advance the week, and reset all cards for the new week. Exercise selections are kept.</div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>setShowRollConfirm(false)} style={{flex:1,padding:"10px",border:"1px solid var(--border)",borderRadius:10,background:"transparent",color:"var(--text-muted)",fontFamily:"var(--font)",fontWeight:600,fontSize:13,cursor:"pointer"}}>Cancel</button>
              <button onClick={doRollover} style={{flex:1,padding:"10px",border:"none",borderRadius:10,background:"var(--accent)",color:"#fff",fontFamily:"var(--font)",fontWeight:600,fontSize:13,cursor:"pointer"}}>Roll Over</button>
            </div>
          </div>
        </div>
      )}

      {/* Day / Addon switcher */}
      {activeTab==="today"&&(
        <div style={{padding:"6px 8px 0"}}>
          <div style={{display:"flex",gap:2,marginBottom:2}}>
            {DAYS_CONFIG.map((d,i)=>(
              <button key={d.key} onClick={()=>setActiveDay(i)} style={{flex:1,minWidth:0,background:activeDay===i?"var(--accent)":"transparent",color:activeDay===i?"#fff":"var(--text-muted)",border:"none",borderRadius:6,padding:"6px 1px",cursor:"pointer",fontFamily:"var(--font)",fontWeight:600,fontSize:10}}>
                {d.label.slice(0,3)}
              </button>
            ))}
            {ADDON_CONFIGS.map(a=>(
              <button key={a.key} onClick={()=>setActiveDay(a.key)} style={{minWidth:0,background:activeDay===a.key?"#f59e0b":"transparent",color:activeDay===a.key?"#fff":"var(--text-muted)",border:"none",borderRadius:6,padding:"6px 5px",cursor:"pointer",fontFamily:"var(--font)",fontWeight:600,fontSize:10}}>
                {a.label.slice(0,4)}
              </button>
            ))}
          </div>
        </div>
      )}

      {/* Content */}
      <div style={{padding:"6px 10px"}}>
        {activeTab==="home" && <DashboardView state={state} history={history} monday={monday}/>}

        {activeTab==="today" && (()=>{
          // Check if addon
          const addon = ADDON_CONFIGS.find(a=>a.key===activeDay);
          if(addon) return <AddOnView addonKey={addon.key} label={addon.label} data={state.addons[addon.key]||{}} onChange={d=>setState({...state,addons:{...state.addons,[addon.key]:d}})} history={history} monday={monday} onExerciseDone={(ex)=>handleExerciseDone(ex, null, null)}/>;
          
          const dc = DAYS_CONFIG[activeDay];
          if(!dc) return null;
          if(dc.type==="strength") return (
            <div>
              <StrengthDay dayKey={dc.key} title={dc.title} exercises={state.exercises[dc.key]||[]} onExercisesChange={exs=>setState({...state,exercises:{...state.exercises,[dc.key]:exs}})} history={history} monday={monday} offset={dc.offset} onExerciseDone={(ex)=>{
                const idx = (state.exercises[dc.key]||[]).findIndex(e=>e.name===ex.name);
                handleExerciseDone(ex, dc.key, idx);
              }}/>
              <div style={{background:"var(--card-bg)",border:"1px solid var(--border)",borderRadius:14,padding:"12px 14px",marginTop:10}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span style={{fontWeight:700,fontSize:13,fontFamily:"var(--font)"}}>Neck PT</span>
                  <button onClick={()=>setState({...state,pt:{...state.pt,[dc.key]:!state.pt[dc.key]}})} style={{width:30,height:30,borderRadius:7,border:state.pt[dc.key]?"none":"2px solid var(--border)",background:state.pt[dc.key]?"#22c55e":"transparent",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}}>
                    {state.pt[dc.key]&&<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="3" strokeLinecap="round"><polyline points="20 6 9 17 4 12"/></svg>}
                  </button>
                </div>
              </div>
            </div>
          );
          if(dc.type==="cardio") return <CardioDay data={state.cardio[dc.key]||{}} onChange={d=>setState({...state,cardio:{...state.cardio,[dc.key]:d}})} monday={monday} offset={dc.offset}/>;
          if(dc.type==="recovery") return <RecoveryDay data={state.recovery||{}} onChange={d=>setState({...state,recovery:d})} monday={monday}/>;
        })()}

        {activeTab==="body" && <BodyMapView exercises={state.exercises} addons={state.addons}/>}
        {activeTab==="hangs" && <HangboardView />}
        {activeTab==="weight" && <BodyweightView bodyweight={bodyweight} setBodyweight={setBodyweight}/>}
        {activeTab==="muscles" && <MuscleCoverage exercises={state.exercises} addons={state.addons}/>}
        {activeTab==="history" && <HistoryView history={history}/>}
        {activeTab==="catalog" && <CatalogView/>}
      </div>

      {/* Bottom Nav */}
      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:"rgba(15,17,21,0.95)",backdropFilter:"blur(12px)",borderTop:"1px solid var(--border)",display:"flex",justifyContent:"space-around",padding:"4px 0 8px",zIndex:100}}>
        {tabs.map(t=>(
          <button key={t.key} onClick={()=>setActiveTab(t.key)} style={{background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:0,padding:"2px 6px"}}>
            <span style={{fontSize:15}}>{t.icon}</span>
            <span style={{fontSize:8,fontWeight:600,color:activeTab===t.key?"var(--accent)":"var(--text-muted)",fontFamily:"var(--font)"}}>{t.label}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
